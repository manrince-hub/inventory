<!DOCTYPE html>
<html>
<head>
<title>Log Masuk Pegawai - Sistem Permohonan Stok</title>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#f6f7fb;
    --card:#ffffff;
    --text:#0f172a;
    --biru:#2563eb;
    --bayang:0 10px 25px rgba(0,0,0,0.08);
}

body{
    margin:0;
    font-family:Inter, sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:var(--card);
    padding:32px;
    border-radius:14px;
    box-shadow:var(--bayang);
    width:100%;
    max-width:380px;
}

.badge{
    display:inline-block;
    background:#dbeafe;
    color:#1e40af;
    font-size:12px;
    font-weight:700;
    padding:4px 10px;
    border-radius:20px;
    margin-bottom:10px;
}

h2{
    margin-top:0;
}

.tabs{
    display:flex;
    gap:8px;
    margin-bottom:16px;
}

.tab-btn{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#f1f5f9;
    color:#555;
    font-weight:600;
    cursor:pointer;
    font-size:14px;
}

.tab-btn.active{
    background:var(--biru);
    color:white;
}

label{
    display:block;
    margin-top:14px;
    font-size:14px;
    font-weight:600;
}

input, select{
    width:100%;
    padding:12px;
    margin-top:6px;
    border-radius:10px;
    border:1px solid #ddd;
    box-sizing:border-box;
    font-family:inherit;
}

button.submit{
    margin-top:22px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--biru);
    color:white;
    font-weight:600;
    cursor:pointer;
    font-size:15px;
}

button.submit:hover{ opacity:0.9; }

#msg{
    margin-top:14px;
    font-size:13px;
    text-align:center;
}

.msg-error{ color:#ef4444; }
.msg-success{ color:#16a34a; }

.footer-link{
    margin-top:20px;
    font-size:13px;
    text-align:center;
    color:#888;
}

.footer-link a{
    color:var(--biru);
    text-decoration:none;
    font-weight:600;
}

.hint{
    margin-top:6px;
    font-size:12px;
    color:#999;
}

.hidden{ display:none; }

</style>
</head>

<body>

<div class="card">

<span class="badge">KHAS PEGAWAI</span>
<h2>Portal Pegawai</h2>

<div class="tabs">
    <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Log Masuk</button>
    <button class="tab-btn" id="tabDaftar" onclick="switchTab('daftar')">Daftar Akaun</button>
</div>

<!-- FORM LOGIN -->
<div id="formLogin">
    <label>Username</label>
    <input id="login_username" placeholder="Username rasmi anda">

    <label>Kata Laluan</label>
    <input id="login_password" type="password" placeholder="Kata laluan">

    <button class="submit" onclick="doLogin()">Log Masuk</button>
</div>

<!-- FORM DAFTAR -->
<div id="formDaftar" class="hidden">
    <label>Nama Penuh</label>
    <input id="reg_nama" placeholder="Nama penuh anda">

    <label>Jawatan</label>
    <input id="reg_jawatan" placeholder="Contoh: Ketua Jabatan, Penyelia Stor">

    <label>Peranan</label>
    <select id="reg_role">
        <option value="pelulus">Pelulus (boleh luluskan permohonan)</option>
        <option value="stor">Stor (boleh kemaskini rekod)</option>
    </select>

    <label>Pilih Username</label>
    <input id="reg_username" placeholder="Username pilihan anda">

    <label>Kata Laluan</label>
    <input id="reg_password" type="password" placeholder="Cipta kata laluan">

    <label>Kod Pendaftaran Pegawai</label>
    <input id="reg_kod" placeholder="Dapatkan daripada pentadbir sistem">
    <div class="hint">Kod ini menghalang orang luar mendaftar sebagai pegawai. Hubungi pentadbir sistem jika tiada kod.</div>

    <button class="submit" onclick="doRegister()">Daftar Akaun</button>
</div>

<div id="msg"></div>

<div class="footer-link">
    Bukan pegawai? <a href="login-guest.html">Masuk sebagai Pemohon</a>
</div>

</div>

<script>

const API = "http://127.0.0.1:5000";

function switchTab(tab){
    document.getElementById("msg").innerText = "";

    if(tab === "login"){
        document.getElementById("formLogin").classList.remove("hidden");
        document.getElementById("formDaftar").classList.add("hidden");
        document.getElementById("tabLogin").classList.add("active");
        document.getElementById("tabDaftar").classList.remove("active");
    } else {
        document.getElementById("formLogin").classList.add("hidden");
        document.getElementById("formDaftar").classList.remove("hidden");
        document.getElementById("tabLogin").classList.remove("active");
        document.getElementById("tabDaftar").classList.add("active");
    }
}

function showMsg(text, isError){
    let el = document.getElementById("msg");
    el.innerText = text;
    el.className = isError ? "msg-error" : "msg-success";
}

async function doLogin(){

    let username = document.getElementById("login_username").value;
    let password = document.getElementById("login_password").value;

    if(!username || !password){
        showMsg("Sila isi username dan kata laluan.", true);
        return;
    }

    try{
        let res = await fetch(API+"/login", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            credentials:"include",
            body:JSON.stringify({ username, password })
        });

        let data = await res.json();

        if(!res.ok){
            showMsg(data.message || "Log masuk gagal.", true);
            return;
        }

        // Halaman ni KHAS untuk pegawai - tolak akaun pemohon/guest
        if(data.role === "pemohon"){
            await fetch(API+"/logout", { method:"POST", credentials:"include" });
            showMsg("Akaun ini bukan akaun pegawai. Sila guna halaman pemohon.", true);
            return;
        }

        if(data.role === "pelulus"){
            window.location.href = "kelulusan.html";
        } else if(data.role === "stor"){
            window.location.href = "kemaskini.html";
        } else {
            window.location.href = "permohonan.html";
        }

    } catch(err){
        showMsg("Ralat sambungan ke server: " + err.message, true);
        console.error(err);
    }
}

async function doRegister(){

    let nama_penuh = document.getElementById("reg_nama").value;
    let jawatan = document.getElementById("reg_jawatan").value;
    let role = document.getElementById("reg_role").value;
    let username = document.getElementById("reg_username").value;
    let password = document.getElementById("reg_password").value;
    let kod_pendaftaran = document.getElementById("reg_kod").value;

    if(!nama_penuh || !jawatan || !username || !password || !kod_pendaftaran){
        showMsg("Sila isi semua ruangan.", true);
        return;
    }

    try{
        let res = await fetch(API+"/register-pegawai", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({ nama_penuh, jawatan, role, username, password, kod_pendaftaran })
        });

        let data = await res.json();

        if(!res.ok){
            showMsg(data.message || "Pendaftaran gagal.", true);
            return;
        }

        showMsg("Pendaftaran berjaya! Melog masuk...", false);

        let loginRes = await fetch(API+"/login", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            credentials:"include",
            body:JSON.stringify({ username, password })
        });

        let loginData = await loginRes.json();

        if(loginRes.ok){
            if(loginData.role === "pelulus"){
                window.location.href = "kelulusan.html";
            } else {
                window.location.href = "kemaskini.html";
            }
        } else {
            switchTab("login");
            showMsg("Pendaftaran berjaya! Sila log masuk.", false);
        }

    } catch(err){
        showMsg("Ralat sambungan ke server: " + err.message, true);
        console.error(err);
    }
}

document.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        if(document.getElementById("formDaftar").classList.contains("hidden")){
            doLogin();
        } else {
            doRegister();
        }
    }
});

</script>

</body>
</html>
